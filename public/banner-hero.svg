<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0c1445"/>
      <stop offset="35%"  stop-color="#1a3a6b"/>
      <stop offset="65%"  stop-color="#0ea5e9"/>
      <stop offset="85%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0369a1"/>
      <stop offset="50%"  stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="sunGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="30%"  stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Céu -->
  <rect width="1600" height="900" fill="url(#skyGrad)"/>

  <!-- Estrelas (pontos) -->
  <g fill="white" opacity="0.7">
    <circle cx="120"  cy="80"  r="1.2"/>
    <circle cx="340"  cy="45"  r="1.5"/>
    <circle cx="580"  cy="110" r="1"/>
    <circle cx="760"  cy="60"  r="1.8"/>
    <circle cx="950"  cy="90"  r="1"/>
    <circle cx="1150" cy="40"  r="1.3"/>
    <circle cx="1380" cy="75"  r="1.6"/>
    <circle cx="1520" cy="130" r="1"/>
    <circle cx="220"  cy="150" r="1.2"/>
    <circle cx="460"  cy="170" r="0.8"/>
    <circle cx="680"  cy="140" r="1.4"/>
    <circle cx="890"  cy="160" r="1"/>
    <circle cx="1080" cy="120" r="1.2"/>
    <circle cx="1300" cy="155" r="0.9"/>
    <circle cx="70"   cy="200" r="1"/>
    <circle cx="1480" cy="190" r="1.3"/>
  </g>

  <!-- Sol / Pôr do sol (círculo luminoso no horizonte) -->
  <ellipse cx="800" cy="560" rx="200" ry="200" fill="url(#sunRad)" opacity="0.35" filter="url(#blur)"/>
  <ellipse cx="800" cy="560" rx="90"  ry="90"  fill="#fde68a" opacity="0.25"/>

  <!-- Nuvens estilizadas -->
  <g fill="white" opacity="0.12">
    <ellipse cx="200"  cy="300" rx="130" ry="55"/>
    <ellipse cx="300"  cy="285" rx="100" ry="45"/>
    <ellipse cx="130"  cy="315" rx="90"  ry="40"/>
  </g>
  <g fill="white" opacity="0.08">
    <ellipse cx="1320" cy="250" rx="150" ry="60"/>
    <ellipse cx="1430" cy="235" rx="110" ry="45"/>
    <ellipse cx="1230" cy="265" rx="100" ry="40"/>
  </g>
  <g fill="white" opacity="0.07">
    <ellipse cx="700"  cy="350" rx="120" ry="50"/>
    <ellipse cx="810"  cy="335" rx="90"  ry="40"/>
  </g>

  <!-- Avião pequeno no céu -->
  <g transform="translate(1100,280) rotate(-12)" opacity="0.9" filter="url(#glow)">
    <ellipse rx="40" ry="10" fill="white"/>
    <path d="M-10,-5 L15,-30 L22,-26 L5,0 Z"  fill="white"/>
    <path d="M-20,-4 L-38,-18 L-34,-22 L-14,0 Z" fill="white" opacity="0.8"/>
    <path d="M-32,-3 L-48,-12 L-44,-16 L-28,0 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- Linha do horizonte / oceano -->
  <rect x="0" y="555" width="1600" height="345" fill="url(#oceanGrad)"/>

  <!-- Reflexo solar no oceano -->
  <ellipse cx="800" cy="600" rx="280" ry="30" fill="#fde68a" opacity="0.18"/>
  <ellipse cx="800" cy="640" rx="160" ry="14" fill="#fbbf24" opacity="0.10"/>

  <!-- Ondas estilizadas -->
  <g fill="none" stroke="white" stroke-width="1.5" opacity="0.12">
    <path d="M0,620 Q200,605 400,620 Q600,635 800,620 Q1000,605 1200,620 Q1400,635 1600,620"/>
    <path d="M0,660 Q200,645 400,660 Q600,675 800,660 Q1000,645 1200,660 Q1400,675 1600,660"/>
    <path d="M0,700 Q200,685 400,700 Q600,715 800,700 Q1000,685 1200,700 Q1400,715 1600,700"/>
    <path d="M0,740 Q200,725 400,740 Q600,755 800,740 Q1000,725 1200,740 Q1400,755 1600,740"/>
  </g>

  <!-- Overlay escuro nas bordas (para texto sobreposto) -->
  <rect width="1600" height="900" fill="black" opacity="0.25"/>
</svg>
