<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="destGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="40%"  stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="blurDest">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Fundo principal -->
  <rect width="1200" height="400" fill="url(#destGrad)"/>

  <!-- Círculos decorativos no fundo -->
  <circle cx="80"   cy="80"  r="120" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1130" cy="320" r="150" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="600"  cy="200" r="250" fill="#1d4ed8" opacity="0.06"/>

  <!-- Mapa/Grid estilizado (linhas de latitude/longitude) -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.12">
    <!-- Horizontais -->
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <!-- Verticais -->
    <line x1="150"  y1="0" x2="150"  y2="400"/>
    <line x1="300"  y1="0" x2="300"  y2="400"/>
    <line x1="450"  y1="0" x2="450"  y2="400"/>
    <line x1="600"  y1="0" x2="600"  y2="400"/>
    <line x1="750"  y1="0" x2="750"  y2="400"/>
    <line x1="900"  y1="0" x2="900"  y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- Pins de destinos (círculos com ponto) -->
  <g fill="url(#accentGrad)" opacity="0.8">
    <circle cx="220" cy="130" r="6"/>
    <circle cx="220" cy="130" r="3" fill="white"/>
    <circle cx="490" cy="200" r="6"/>
    <circle cx="490" cy="200" r="3" fill="white"/>
    <circle cx="720" cy="150" r="6"/>
    <circle cx="720" cy="150" r="3" fill="white"/>
    <circle cx="940" cy="220" r="6"/>
    <circle cx="940" cy="220" r="3" fill="white"/>
    <circle cx="1060" cy="120" r="6"/>
    <circle cx="1060" cy="120" r="3" fill="white"/>
    <circle cx="380"  cy="270" r="6"/>
    <circle cx="380"  cy="270" r="3" fill="white"/>
    <circle cx="820"  cy="300" r="6"/>
    <circle cx="820"  cy="300" r="3" fill="white"/>
  </g>

  <!-- Linha de rota pontilhada conectando destinos -->
  <path d="M220,130 Q350,90 490,200 Q610,300 720,150 Q830,20 940,220 Q1000,310 1060,120"
        fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- Avião na rota -->
  <g transform="translate(810,80) rotate(25)" opacity="0.85">
    <ellipse rx="18" ry="5" fill="white"/>
    <path d="M-5,-3 L8,-14 L12,-11 L2,2 Z" fill="white"/>
    <path d="M-10,-2 L-20,-10 L-17,-13 L-7,1 Z" fill="white" opacity="0.7"/>
  </g>

  <!-- Texto de branding -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="800" fill="white" opacity="0.1" letter-spacing="8">BRASIL</text>

  <!-- Gradiente de escurecimento nas bordas -->
  <rect width="1200" height="400" fill="black" opacity="0.15"/>
</svg>
